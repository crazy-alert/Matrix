# Использовать секрет для аутентификации (статический ключ)
use-auth-secret
static-auth-secret=${TURN_STATIC_AUTH_SECRET}
realm=${TURN_REALM}

# Отключаем TCP relay (оставляем только UDP)
no-tcp-relay

# Параметры слушателя
listening-port=3478
listening-ip=${TURN_INTERNAL_IP}
# Если у контейнера host network, можно также указать внешний IP
listening-ip=${TURN_EXTERNAL_IP}

# Внешний IP для relayed адресов
external-ip=${TURN_EXTERNAL_IP}

# Диапазон портов для медиа-трафика
min-port=50000
max-port=51000

# Ограничения пользователей
user-quota=12
total-quota=1200

# Безопасность
no-cli
# Разрешить все приватные сети? Будьте осторожны, см. статью.
# denied-peer-ip=192.168.0.0-192.168.255.255  # Закомментировано как в статье
allowed-peer-ip=${TURN_INTERNAL_IP} # Разрешить ваш внутренний IP
allow-loopback-peers

# Логирование
log-file=/var/log/coturn/coturn.log
verbose