services:
  caddy:
    image: "caddy:${CADDY_VERSION:-2-alpine}"
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - MATRIX_DOMAIN=matrix.${DOMAIN}
      - ADMIN_EMAIL=${CADDY_EMAIL}
    networks:
      - internal
  permissions:
    image: alpine:latest
    restart: "no"
    volumes:
      - synapse_data:/data
    command: chown -R 991:991 /data

  synapse:
    image: "docker.io/matrixdotorg/synapse:${SYNAPSE_VERSION}"
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    volumes:
      - synapse_data:/data   # для логов, медиа и ключей (они будут создаваться)
      - ./homeserver.yaml:/data/homeserver.yaml:ro   # монтируем готовый конфиг
    depends_on:
      - synapse_db
    networks:
      - internal

  synapse_db:
    image: "docker.io/postgres:${POSTGRES_VERSION}"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - synapse_db_data:/var/lib/postgresql/data
    networks:
      - internal

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: matrix_admin
    restart: unless-stopped
    networks:
      - internal

  coturn:
    image: "instrumentisto/coturn:${COTURN_VERSION}"
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "5349:5349"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./coturn/turnserver.conf.template:/etc/coturn/turnserver.conf.template:ro
      - ./coturn/logs:/var/log/coturn
    environment:
      - COTURN_STATIC_AUTH_SECRET=${COTURN_STATIC_AUTH_SECRET}
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP}
      - COTURN_INTERNAL_IP=${COTURN_INTERNAL_IP}
      - DOMAIN=${DOMAIN}
    networks:
      - internal
    command:
      - /bin/sh
      - -c
      - |
        envsubst < /etc/coturn/turnserver.conf.template > /etc/coturn/turnserver.conf &&
        exec turnserver -c /etc/coturn/turnserver.conf

volumes:
  caddy_data:
  caddy_config:
  synapse_data:
  synapse_db_data:

networks:
  internal:
    driver: bridge